# Horizontal scale: replicas x --connections = total sustained connections.
#   20 replicas x 2000 connections = ~40,000 sustained connections.
#
# Many small pods give a more realistic, distributed client footprint than one
# giant process. This is a WINDOWS container, so it must land on a Windows node
# pool (nodeSelector below); the image base must match the node's Windows build
# (see Dockerfile WINDOWS_VERSION).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eh-loadtest
  labels: { app: eh-loadtest }
spec:
  replicas: 20
  selector:
    matchLabels: { app: eh-loadtest }
  template:
    metadata:
      labels: { app: eh-loadtest }
    spec:
      # Schedule onto Windows nodes; this is a Windows container image.
      nodeSelector:
        kubernetes.io/os: windows
      containers:
        - name: eh-loadtest
          image: youracr.azurecr.io/eh-loadtest:1.0
          args:
            # host, target, and signing URI are all derived from the
            # connection string in EH_CONNECTION_STRING below.
            - "--connections=2000"
            - "--interval-ms=1000"
            - "--ramp-s=60"
            - "--warmup-s=30"
            - "--report-interval-s=10"
          env:
            # Whole connection string from a k8s Secret - never bake it into
            # the image. Include EntityPath=<hub> so the target is set for you.
            - name: EH_CONNECTION_STRING
              valueFrom: { secretKeyRef: { name: eh-sas, key: connectionString } }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
---
# Create the Secret once (do NOT commit real values):
#   kubectl create secret generic eh-sas \
#     --from-literal=connectionString='Endpoint=sb://myns.servicebus.windows.net/;SharedAccessKeyName=SendPolicy;SharedAccessKey=<base64-key>;EntityPath=myeventhub'
